name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (rustfmt + clippy + JS)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (clippy needs the same headers as build)
        run: |
          sudo apt-get update
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libgtk-4-dev \
              libgstreamer1.0-dev \
              libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev \
              libpipewire-0.3-dev \
              libtesseract-dev \
              libxkbcommon-dev \
              libx11-dev \
              libxtst-dev \
              libwayland-dev \
              libdbus-1-dev \
              meson ninja-build gobject-introspection valac \
              qtbase5-dev libqt5x11extras5-dev pkg-config && break
            echo "apt-get install attempt $i failed, retrying..."
            sleep 10
            sudo apt-get update
          done

      - name: Build gtk4-layer-shell from source
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --prefix=/usr
          sudo ninja -C build install
          sudo ldconfig

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # The codebase still carries a backlog of pre-existing clippy
        # warnings (see issue tracker). We surface them on every CI run so
        # contributors can see the noise around their changes, but we
        # don't yet fail the build on them. Once the backlog is cleared
        # this step should become `-- -D warnings`.
        run: cargo clippy --workspace --all-targets

      - name: GNOME extension JS syntax check
        run: |
          # The GJS-targeted unit tests in gnome-extension/tests/ rely on
          # GNOME globals (printerr, imports.gi …) and can't be run under
          # plain Node, but `node --check` is a fast safety net for the
          # extension source files themselves.
          set -euo pipefail
          for f in gnome-extension/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

  ci:
    name: Build & Test
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libgtk-4-dev \
              libgstreamer1.0-dev \
              libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-good \
              gstreamer1.0-plugins-bad \
              libpipewire-0.3-dev \
              libtesseract-dev \
              libxkbcommon-dev \
              libx11-dev \
              libxtst-dev \
              libwayland-dev \
              libdbus-1-dev \
              meson \
              ninja-build \
              gobject-introspection \
              valac \
              qtbase5-dev \
              libqt5x11extras5-dev \
              pkg-config && break
            echo "apt-get install attempt $i failed, retrying..."
            sleep 10
            sudo apt-get update
          done

      - name: Build gtk4-layer-shell from source
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --prefix=/usr
          sudo ninja -C build install
          sudo ldconfig

      - name: Build
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --verbose

  release:
    name: Build .deb & Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ci]
    container:
      image: ubuntu:25.10
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_API_URL: ${{ github.api_url }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap container tooling
        run: |
          apt-get update
          apt-get install -y curl ca-certificates git zip

      - name: Add swap space to prevent OOM during build
        run: |
          if swapon --show | grep -q '/swapfile'; then
            echo "Swap already configured, skipping"
          else
            fallocate -l 4G /swapfile
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          apt-get update
          for i in 1 2 3; do
            apt-get install -y --fix-missing \
              clang \
              cmake \
              libgtk-4-dev \
              libclang-dev \
              libgstreamer1.0-dev \
              libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-good \
              gstreamer1.0-plugins-bad \
              libpipewire-0.3-dev \
              libtesseract-dev \
              libxkbcommon-dev \
              libx11-dev \
              libxtst-dev \
              libwayland-dev \
              libdbus-1-dev \
              meson \
              ninja-build \
              gobject-introspection \
              valac \
              qtbase5-dev \
              libqt5x11extras5-dev \
              pkg-config && break
            echo "apt-get install attempt $i failed, retrying..."
            sleep 10
            apt-get update
          done

      - name: Build gtk4-layer-shell from source
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --prefix=/usr
          ninja -C build install
          ldconfig

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binaries
        run: cargo build --release --verbose

      - name: Stage capture helper for Debian packaging
        run: |
          mkdir -p packaging/deb
          cp target/release/apexshot-capture packaging/deb/apexshot-capture

      - name: Verify staged capture helper matches release build
        run: cmp target/release/apexshot-capture packaging/deb/apexshot-capture

      - name: Build .deb package
        run: cargo deb --no-build --verbose

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package GNOME extension
        run: |
          cd gnome-extension
          zip apexshot-gnome-integration.zip \
            extension.js metadata.json \
            controls-ui.js controls-ui-layout.js \
            keystroke-display.js click-display.js \
            mask-ui.js runtime-overlays.js runtime-overlays-visibility.js \
            screenshot-lock.js session-state.js window-list.js \
            gnome-version.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ApexShot ${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            target/debian/*.deb
            gnome-extension/apexshot-gnome-integration.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  arch:
    name: Build Arch Linux package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ci]
    container:
      image: archlinux:latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel \
            rust \
            git \
            cmake \
            clang \
            pkgconf \
            gtk4 \
            libadwaita \
            gtk4-layer-shell \
            gst-plugins-base \
            gst-plugins-good \
            gst-plugins-bad \
            gst-libav \
            pipewire \
            pipewire-pulse \
            tesseract \
            tesseract-data-eng \
            qt5-base \
            qt5-x11extras \
            libxtst \
            wl-clipboard \
            libnotify \
            xdg-utils \
            ffmpeg \
            wget \
            curl \
            unzip \
            sudo
          which cargo && cargo --version

      - name: Build
        run: cargo build --release --verbose

      - name: Stage capture helper
        run: cp target/release/apexshot-capture packaging/deb/apexshot-capture

      - name: Build package with makepkg
        run: |
          cd packaging/arch
          # makepkg refuses to run as root; use a build user
          useradd -m builduser
          echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builduser:builduser /__w/apexshot/apexshot
          sudo -u builduser makepkg -sf --noconfirm

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Upload Arch package to release
        uses: softprops/action-gh-release@v2
        with:
          name: ApexShot ${{ steps.get_version.outputs.VERSION }}
          files: |
            packaging/arch/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
