name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint (rustfmt + clippy + JS)
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Install system dependencies (clippy needs the same headers as build)
        run: |
          sudo apt-get update
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libgtk-4-dev \
              libgstreamer1.0-dev \
              libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev \
              libpipewire-0.3-dev \
              libtesseract-dev \
              libxkbcommon-dev \
              libx11-dev \
              libxtst-dev \
              libwayland-dev \
              libdbus-1-dev \
              meson ninja-build gobject-introspection valac \
              qtbase5-dev libqt5x11extras5-dev pkg-config && break
            echo "apt-get install attempt $i failed, retrying..."
            sleep 10
            sudo apt-get update
          done

      - name: Build gtk4-layer-shell from source
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --prefix=/usr
          sudo ninja -C build install
          sudo ldconfig

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # The codebase still carries a backlog of pre-existing clippy
        # warnings (see issue tracker). We surface them on every CI run so
        # contributors can see the noise around their changes, but we
        # don't yet fail the build on them. Once the backlog is cleared
        # this step should become `-- -D warnings`.
        run: cargo clippy --workspace --all-targets

      - name: GNOME extension JS syntax check
        run: |
          # The GJS-targeted unit tests in gnome-extension/tests/ rely on
          # GNOME globals (printerr, imports.gi …) and can't be run under
          # plain Node, but `node --check` is a fast safety net for the
          # extension source files themselves.
          set -euo pipefail
          for f in gnome-extension/*.js; do
            echo "node --check $f"
            node --check "$f"
          done

  ci:
    name: Build & Test
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          for i in 1 2 3; do
            sudo apt-get install -y --fix-missing \
              libgtk-4-dev \
              libgstreamer1.0-dev \
              libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-good \
              gstreamer1.0-plugins-bad \
              libpipewire-0.3-dev \
              libtesseract-dev \
              libxkbcommon-dev \
              libx11-dev \
              libxtst-dev \
              libwayland-dev \
              libdbus-1-dev \
              meson \
              ninja-build \
              gobject-introspection \
              valac \
              qtbase5-dev \
              libqt5x11extras5-dev \
              pkg-config && break
            echo "apt-get install attempt $i failed, retrying..."
            sleep 10
            sudo apt-get update
          done

      - name: Build gtk4-layer-shell from source
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --prefix=/usr
          sudo ninja -C build install
          sudo ldconfig

      - name: Build
        run: cargo build --release --verbose

      - name: Run tests
        run: cargo test --jobs 2 -- --test-threads=1

  release:
    name: Build .deb & Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/')
    container:
      image: ubuntu:25.10
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_API_URL: ${{ github.api_url }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap container tooling
        run: |
          apt-get update
          apt-get install -y --no-install-recommends curl ca-certificates git zip

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          . "$HOME/.cargo/env"
          rustup default stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Add swap space to prevent OOM during build
        run: |
          if swapon --show | grep -q '/swapfile'; then
            echo "Swap already configured, skipping"
          else
            fallocate -l 4G /swapfile || dd if=/dev/zero of=/swapfile bs=1M count=4096
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
          fi
          swapon --show
          free -h

      - name: Cache cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install system dependencies
        run: |
          apt-get update
          for i in 1 2 3; do
            apt-get install -y --fix-missing \
              clang cmake pkg-config \
              libgtk-4-dev libclang-dev \
              libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
              libgstreamer-plugins-bad1.0-dev \
              gstreamer1.0-plugins-good gstreamer1.0-plugins-bad \
              libpipewire-0.3-dev libtesseract-dev \
              libxkbcommon-dev libx11-dev libxtst-dev libwayland-dev libdbus-1-dev \
              meson ninja-build gobject-introspection valac \
              qtbase5-dev libqt5x11extras5-dev && break
            echo "apt-get install attempt $i failed, retrying..."
            sleep 10
            apt-get update
          done
          # Fail if the loop exhausted all retries without breaking
          dpkg -l libgtk-4-dev cmake clang > /dev/null 2>&1 || (echo "ERROR: Required packages not installed" && exit 1)

      - name: Build gtk4-layer-shell from source
        run: |
          git clone https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          cd /tmp/gtk4-layer-shell
          meson setup build --prefix=/usr
          ninja -C build install
          ldconfig

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build release binaries
        run: cargo build --release --verbose

      - name: Stage capture helper for Debian packaging
        run: |
          mkdir -p packaging/deb
          cp target/release/apexshot-capture packaging/deb/apexshot-capture

      - name: Verify staged capture helper matches release build
        run: cmp target/release/apexshot-capture packaging/deb/apexshot-capture

      - name: Build .deb package
        run: cargo deb --no-build --verbose

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Package GNOME extension
        run: |
          cd gnome-extension
          zip apexshot-gnome-integration.zip \
            extension.js metadata.json \
            controls-ui.js controls-ui-layout.js \
            mask-ui.js runtime-overlays.js runtime-overlays-visibility.js \
            screenshot-lock.js session-state.js window-list.js \
            gnome-version.js

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ApexShot ${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            target/debian/*.deb
            gnome-extension/apexshot-gnome-integration.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  fedora:
    name: Build Fedora RPM package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/')
    needs: [release]
    container:
      image: fedora:42
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_API_URL: ${{ github.api_url }}
        GITHUB_SERVER_URL: ${{ github.server_url }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y update
          dnf -y install \
            cargo \
            rust \
            git \
            cmake \
            clang \
            pkgconf-pkg-config \
            gtk4-devel \
            gtk4-layer-shell-devel \
            libadwaita-devel \
            dbus-devel \
            pipewire-devel \
            qt5-qtbase-devel \
            qt5-qtx11extras-devel \
            libXtst-devel \
            tesseract-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            rpm-build \
            desktop-file-utils \
            hicolor-icon-theme
          cargo --version
          rpmbuild --version

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build Fedora RPMs
        run: scripts/build-fedora-rpm.sh "${{ steps.get_version.outputs.VERSION }}"

      - name: Upload Fedora RPMs to release
        uses: softprops/action-gh-release@v2
        with:
          name: ApexShot ${{ steps.get_version.outputs.VERSION }}
          files: |
            target/fedora-rpmbuild/RPMS/*/*.rpm
            target/fedora-rpmbuild/SRPMS/*.src.rpm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  arch:
    name: Build Arch Linux package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/')
    container:
      image: archlinux:latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm \
            base-devel \
            rust \
            git \
            cmake \
            clang \
            pkgconf \
            gtk4 \
            libadwaita \
            gtk4-layer-shell \
            gst-plugins-base \
            gst-plugins-good \
            gst-plugins-bad \
            gst-libav \
            pipewire \
            pipewire-pulse \
            tesseract \
            tesseract-data-eng \
            qt5-base \
            qt5-x11extras \
            libxtst \
            wl-clipboard \
            libnotify \
            xdg-utils \
            ffmpeg \
            wget \
            curl \
            unzip \
            sudo
          which cargo && cargo --version

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD version from tag
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          PKGVER="${VERSION#v}"
          ARCHIVE="apexshot-${PKGVER}.tar.gz"
          SOURCE_URL="https://github.com/apex-shot/apexshot/archive/${VERSION}.tar.gz"

          # Download the release tarball and compute its SHA-256
          curl -fsSL "${SOURCE_URL}" -o "/tmp/${ARCHIVE}"
          SHA256="$(sha256sum "/tmp/${ARCHIVE}" | awk '{print $1}')"

          cd packaging/arch
          sed -i \
            -e "s/^pkgver=.*/pkgver=${PKGVER}/" \
            -e "s#^source=.*#source=(\"${ARCHIVE}::${SOURCE_URL}\")#" \
            -e "s/^sha256sums=.*/sha256sums=('${SHA256}')/" \
            PKGBUILD

          echo "Updated PKGBUILD to pkgver=${PKGVER}"
          echo "source=${SOURCE_URL}"
          echo "sha256sums=${SHA256}"

      - name: Build package with makepkg
        run: |
          cd packaging/arch
          # makepkg refuses to run as root; use a build user
          useradd -m builduser
          echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builduser:builduser /__w/apexshot/apexshot
          sudo -u builduser makepkg -sf --noconfirm

      - name: Upload Arch package to release
        uses: softprops/action-gh-release@v2
        with:
          name: ApexShot ${{ steps.get_version.outputs.VERSION }}
          files: |
            packaging/arch/*.pkg.tar.zst
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  aur:
    name: Publish AUR package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: startsWith(github.ref, 'refs/tags/')
    needs: [arch]
    container:
      image: archlinux:latest
    permissions:
      contents: read
    env:
      AUR_PACKAGE: apexshot
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
      AUR_SSH_KNOWN_HOSTS: ${{ secrets.AUR_SSH_KNOWN_HOSTS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip when AUR SSH key is not configured
        if: env.AUR_SSH_PRIVATE_KEY == ''
        run: |
          echo "AUR_SSH_PRIVATE_KEY is not configured; skipping AUR publish."

      - name: Install AUR publish tools
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm base-devel git openssh curl sudo
          useradd -m builduser
          echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
          chown -R builduser:builduser "$GITHUB_WORKSPACE"

      - name: Prepare AUR metadata
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          sudo -u builduser bash -lc "cd '$GITHUB_WORKSPACE' && scripts/aur-prepare.sh '${GITHUB_REF_NAME}'"
          sudo -u builduser bash -lc "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --verifysource --nobuild"

      - name: Configure SSH
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${AUR_SSH_PRIVATE_KEY}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          if [ -n "${AUR_SSH_KNOWN_HOSTS}" ]; then
            printf '%s\n' "${AUR_SSH_KNOWN_HOSTS}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -t rsa,ed25519 aur.archlinux.org > ~/.ssh/known_hosts
          fi
          cat > ~/.ssh/config <<'EOF'
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ~/.ssh/aur
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF

      - name: Publish to AUR
        if: env.AUR_SSH_PRIVATE_KEY != ''
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "apexshot release bot"
          git config --global user.email "actions@github.com"

          workdir="$(mktemp -d)"
          git clone "ssh://aur@aur.archlinux.org/${AUR_PACKAGE}.git" "$workdir/${AUR_PACKAGE}"
          cp packaging/arch/PKGBUILD packaging/arch/.SRCINFO packaging/arch/apexshot.install "$workdir/${AUR_PACKAGE}/"

          cd "$workdir/${AUR_PACKAGE}"
          git add PKGBUILD .SRCINFO apexshot.install
          if git diff --cached --quiet; then
            echo "AUR package is already up to date."
            exit 0
          fi
          git commit -m "Update to ${GITHUB_REF_NAME#v}"
          git push
