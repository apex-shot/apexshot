name: Feature request
description: Suggest a new capability or improvement.
title: "[feat] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an idea! Please describe **the problem** you'd
        like solved, not just a specific implementation. That helps us
        consider alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Who hits this, how often, and how do they currently work around it?
      placeholder: |
        When I record a tutorial, I have to stop and …
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A description of what you'd like to happen.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why they fall short.

  - type: dropdown
    id: subsystem
    attributes:
      label: Which subsystem does this touch?
      multiple: true
      options:
        - Capture (screenshots, crosshair, area, window, OCR)
        - Recording (video, GIF, audio, webcam)
        - Editor / annotations
        - GNOME extension (runtime overlays, mask, controls)
        - Browser extension / native messaging host
        - Daemon, hotkeys, tray
        - Settings UI / onboarding
        - Packaging / distribution
        - Documentation
        - Don't know
    validations:
      required: true

  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This is a feature request, not a bug report.
          required: true
        - label: I searched existing issues and didn't find a duplicate.
          required: true
